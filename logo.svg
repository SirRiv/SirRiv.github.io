<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" fill="none" stroke="currentColor">
  <title>Logo SrRiv - S Cyber-Lightning</title>
  <defs>
    <!-- Gradiente para el círculo exterior -->
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0055ff" />
      <stop offset="50%" stop-color="#00aaff" />
      <stop offset="100%" stop-color="#00ffff" />
    </linearGradient>
    
    <!-- Gradiente para el rayo central -->
    <linearGradient id="lightningGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff" />
      <stop offset="50%" stop-color="#0088ff" />
      <stop offset="100%" stop-color="#0033ff" />
    </linearGradient>

    <!-- Filtro de brillo de neón -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Filtro de sombra profunda para el fondo -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#041029" />
      <stop offset="70%" stop-color="#020617" />
      <stop offset="100%" stop-color="#00020a" />
    </radialGradient>
  </defs>

  <!-- Círculo de fondo con detalles de radar tecnológico -->
  <circle cx="50" cy="50" r="46" fill="url(#bgGrad)" stroke="url(#circleGrad)" stroke-width="1.5" />
  <circle cx="50" cy="50" r="42" stroke="#0088ff" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.4" />
  <circle cx="50" cy="50" r="38" stroke="#00ffff" stroke-width="0.5" stroke-dasharray="5 5" opacity="0.3" />
  
  <!-- Líneas decorativas de fondo (circuito/nodos de constelación) -->
  <path d="M 50 10 L 50 20 M 50 80 L 50 90 M 10 50 L 20 50 M 80 50 L 90 50" stroke="#0088ff" stroke-width="0.5" opacity="0.5" />
  <circle cx="50" cy="20" r="1.5" fill="#0088ff" />
  <circle cx="50" cy="80" r="1.5" fill="#0088ff" />
  <circle cx="20" cy="50" r="1.5" fill="#00ffff" />
  <circle cx="80" cy="50" r="1.5" fill="#00ffff" />

  <!-- Arcos exteriores del logo original -->
  <path d="M 50 10 A 40 40 0 0 1 82 26 M 88 42 A 40 40 0 0 1 50 90 A 40 40 0 0 1 18 74 M 12 58 A 40 40 0 0 1 50 10" 
        stroke="url(#circleGrad)" 
        stroke-width="3" 
        stroke-linecap="round" 
        filter="url(#neonGlow)" />
  
  <!-- Rayo central del logo original -->
  <path d="M 75 18 
            L 30 48 
            L 55 48 
            L 25 82 
            L 70 52 
            L 45 52 
            Z" 
         fill="url(#lightningGrad)" 
         stroke="#ffffff" 
         stroke-width="1"
         stroke-linejoin="miter" 
         stroke-miterlimit="4"
         filter="url(#neonGlow)" />
</svg>
